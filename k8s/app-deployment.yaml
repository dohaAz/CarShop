apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: spring-app

  template:
    metadata:
      labels:
        app: spring-app

    spec:
      containers:
        - name: spring-app
          image: springboot-app:latest

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8082

          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: mariadb-config
                  key: host

            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: mariadb-config
                  key: port

            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mariadb-secrets
                  key: username

            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secrets
                  key: password

---
apiVersion: v1
kind: Service
metadata:
  name: spring-app-svc

spec:
  selector:
    app: spring-app

  type: NodePort

  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30082